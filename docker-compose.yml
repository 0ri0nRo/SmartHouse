version: '3.8'

services:
  web:
    build: .
    command: python app.py
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_DATABASE=sensor_data
      - DB_USER=postgres
      - DB_PASSWORD=1234
    depends_on:
      - db

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: sensor_data
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trains - Future and Past</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }

        h1 {
            text-align: center;
            color: #007bff;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        h2 {
            color: #007bff;
            border-bottom: 2px solid #007bff;
            padding-bottom: 5px;
            margin-top: 30px;
            font-size: 1.2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
            font-size: 0.9rem;
        }

        th {
            background-color: #007bff;
            color: #fff;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .alert {
            color: #dc3545;
            text-align: center;
            font-size: 1em;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.3rem;
            }

            h2 {
                font-size: 1.1rem;
            }

            th, td {
                font-size: 0.8rem;
                padding: 6px;
            }

            table {
                font-size: 0.8rem;
            }

            .container {
                padding: 10px;
            }

            .alert {
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Trains</h1>

        <!-- Dropdown menu to select destination with input field -->
        <label for="destination-select">Select or enter a destination:</label>
        <select id="destination-select">
            <option value="">Select...</option>
            <option value="COLLEFERRO">COLLEFERRO</option>
            <option value="TORVERGATA">TORVERGATA</option>
            <!-- Add more destinations here -->
        </select>
        <input type="text" id="destination-input" placeholder="Enter destination" />

        <h2>Future Trains</h2>
        <table id="future-trains">
            <thead>
                <tr>
                    <th>Train Number</th>
                    <th>Destination</th>
                    <th>Time</th>
                    <th>Delay</th>
                    <th>Platform</th>
                    <th>Stops</th>
                </tr>
            </thead>
            <tbody>
                <!-- Future train data will be inserted here -->
            </tbody>
        </table>
        
        <h2>Past Trains</h2>
        <table id="past-trains">
            <thead>
                <tr>
                    <th>Train Number</th>
                    <th>Destination</th>
                    <th>Time</th>
                    <th>Delay</th>
                    <th>Platform</th>
                    <th>Stops</th>
                </tr>
            </thead>
            <tbody>
                <!-- Past train data will be inserted here -->
            </tbody>
        </table>
        <div class="alert" id="error-message" style="display: none;">
            Error retrieving train data. Check the console for details.
        </div>
    </div>

    <script>
        // Function to format date and time
        function formatDateTime(dateTime) {
            const options = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' };
            return new Date(dateTime).toLocaleDateString(undefined, options);
        }

        async function fetchTrainData(destination) {
            try {
                const response = await fetch(`/trains_data/${destination}`);
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            } catch (error) {
                document.getElementById('error-message').style.display = 'block';
                console.error('Error fetching train data:', error);
                throw error;
            }
        }

        function displayTrains(data) {
            const now = new Date();
            const futureTrainsTable = document.getElementById('future-trains').getElementsByTagName('tbody')[0];
            const pastTrainsTable = document.getElementById('past-trains').getElementsByTagName('tbody')[0];

            // Clear existing tables
            futureTrainsTable.innerHTML = '';
            pastTrainsTable.innerHTML = '';

            // Convert data object into an array of trains
            const trainsArray = [...data.result, ...data.result_old].map(train => ({
                ...train,
                dateTime: new Date(train.timestamp)
            }));

            // Sort trains by time
            trainsArray.sort((a, b) => a.dateTime - b.dateTime);

            for (const train of trainsArray) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${train.train_number}</td>
                    <td>${train.destination}</td>
                    <td>${train.time}</td>
                    <td>${train.delay}</td>
                    <td>${train.platform || 'N/A'}</td>
                    <td>${train.stops}</td>
                `;
                
                if (train.dateTime >= now) {
                    // Add future trains to the past trains table (inverted)
                    pastTrainsTable.appendChild(row);
                } else {
                    // Add past trains to the future trains table (inverted)
                    futureTrainsTable.appendChild(row);
                }
            }

            // Sort past trains from most recent to oldest
            const pastTrainsRows = Array.from(pastTrainsTable.getElementsByTagName('tr'));
            pastTrainsRows.sort((a, b) => {
                const aDateTime = new Date(`${new Date().toDateString()} ${a.children[2].innerText}`);
                const bDateTime = new Date(`${new Date().toDateString()} ${b.children[2].innerText}`);
                return bDateTime - aDateTime; // From most recent to oldest
            });

            // Re-insert sorted rows into the past trains table
            for (const row of pastTrainsRows) {
                pastTrainsTable.appendChild(row);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const destinationSelect = document.getElementById('destination-select');
            const destinationInput = document.getElementById('destination-input');

            // Function to update train data based on selected destination
            async function updateTrainData() {
                let destination = destinationSelect.value || destinationInput.value.trim();
                if (destination) {
                    try {
                        const trainData = await fetchTrainData(destination);
                        displayTrains(trainData);
                    } catch (error) {
                        // Error already handled in fetchTrainData function
                    }
                }
            }

            // Add change event to dropdown and input field
            destinationSelect.addEventListener('change', () => {
                destinationInput.value = ''; // Clear input field if a predefined destination is selected
                updateTrainData();
            });

            destinationInput.addEventListener('input', () => {
                destinationSelect.value = ''; // Clear selection if a custom destination is entered
                updateTrainData();
            });

            // Initialize page without data until the user selects or enters a destination
        });
    </script>
</body>
</html>

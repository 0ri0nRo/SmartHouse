<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature and Humidity Cards and Charts</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #333;
            margin-top: 20px;
            text-align: center;
        }

        .cards-container {
            display: flex;
            flex-direction: column; /* Stack vertically for mobile */
            gap: 20px;
            margin-bottom: 20px;
            width: 90%;
        }

        .card {
            background-color: #ff6b6b;
            color: white;
            border-radius: 10px;
            padding: 20px;
            width: 100%; /* Full width for mobile */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
            font-size: 16px;
        }

        .card.humidity {
            background-color: #6b8aff;
        }

        .card h2 {
            margin: 0;
            font-size: 24px;
        }

        .card p {
            margin: 5px 0;
        }

        .container {
            width: 100%; /* Full width on mobile */
            max-width: 600px; /* Max width for larger devices */
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .chart-container {
            margin-bottom: 40px;
            background: #f9f9f9; /* Light background for better contrast */
            border-radius: 8px;
            padding: 15px; /* Padding around the chart */
            border: 1px solid #ddd; /* Light border around the chart */
        }

        .chart-container canvas {
            width: 100% !important; /* Ensure the canvas fills its container */
            height: auto !important; /* Maintain aspect ratio */
        }

        .footer {
            margin-top: 20px;
            padding: 15px;
            background: #333;
            color: #fff;
            text-align: center;
            width: 100%;
            position: fixed; /* Fixes the footer to the bottom */
            bottom: 0; /* Sticks to the bottom of the page */
            left: 0; /* Sticks to the left edge of the page */
            box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.2);
            font-size: 18px; /* Slightly larger font size for better readability */
        }

        @media (min-width: 768px) {
            .cards-container {
                flex-direction: row; /* Switch to horizontal layout */
                justify-content: space-around;
                gap: 40px;
            }

            .card {
                width: 250px; /* Restore original width for larger screens */
            }

            .container {
                width: 80%;
            }
        }
    </style>
</head>

<body>
    <h1>Temperature and Humidity</h1>

    <div class="cards-container">
        <!-- Temperature Card -->
        <div class="card">
            <h2 id="temperatureValue">-- °C</h2>
            <p>Indoor: <span id="tempMinMax">-- / --</span></p>
            <p>Outdoor: <span id="colleferroTemp">-- °C</span></p>
        </div>

        <!-- Humidity Card -->
        <div class="card humidity">
            <h2 id="humidityValue">-- %</h2>
            <p>Humidity</p>
            <p><span id="humidityMinMax">-- / --</span></p>
        </div>
    </div>

    <div class="container">
        <div class="chart-container">
            <canvas id="temperatureChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="humidityChart"></canvas>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                const response = await fetch('/api_sensors'); // Backend API
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error fetching data:', error);
                return null;
            }
        }

        async function fetchColleferroTemp() {
            try {
                const response = await fetch('https://archive-api.open-meteo.com/v1/archive?latitude=41.8919&longitude=12.5113&start_date=2024-08-20&end_date=2024-08-20&hourly=temperature_2m&timezone=Europe%2FBerlin'); // Colleferro API
                const data = await response.json();
                const currentTemp = data.hourly.temperature_2m[0]; // Adjust if necessary
                return currentTemp;
            } catch (error) {
                console.error('Error fetching Colleferro temperature:', error);
                return null;
            }
        }

        function addHoursToLabels(labels, hours) {
            return labels.map(label => {
                const [time] = label.split(' ');
                const [h, m] = time.split(':').map(Number);
                const date = new Date();
                date.setHours(h + hours, m);
                return date.toTimeString().slice(0, 5); // Format to HH:MM
            });
        }

        async function updateUI() {
            const data = await fetchData();
            const colleferroTemp = await fetchColleferroTemp();

            if (!data) return;

            // Update current temperature and humidity
            document.getElementById("temperatureValue").textContent = `${data.temperature.current.toFixed(2)} °C`;
            document.getElementById("humidityValue").textContent = `${data.humidity.current.toFixed(2)} %`;

            // Update min/max temperature and humidity
            document.getElementById("tempMinMax").textContent = 
                `${data.temperature.minMaxLast24Hours[0]} / ${data.temperature.minMaxLast24Hours[1]}`;
            document.getElementById("humidityMinMax").textContent = 
                `${data.humidity.minMaxLast24Hours[0]} / ${data.humidity.minMaxLast24Hours[1]}`;

            // Update Colleferro temperature
            document.getElementById("colleferroTemp").textContent = colleferroTemp !== null ? `${colleferroTemp.toFixed(2)} °C` : '-- °C';

            // Adjust labels to add 2 hours
            const adjustedLabels = addHoursToLabels(data.labels, 2);

            // Update temperature chart
            const tempCtx = document.getElementById('temperatureChart').getContext('2d');
            new Chart(tempCtx, {
                type: 'line',
                data: {
                    labels: adjustedLabels,
                    datasets: [{
                        label: 'Temperature (°C)',
                        data: data.temperature.chartData,
                        borderColor: 'rgba(75, 192, 192, 1)',
                        backgroundColor: 'rgba(75, 192, 192, 0.2)',
                        fill: true,
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        tooltip: {
                            callbacks: {
                                label: function(tooltipItem) {
                                    return `Temperature: ${tooltipItem.raw}°C`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Date and Time'
                            },
                            ticks: {
                                autoSkip: false, // Ensure all labels are shown
                                maxRotation: 45, // Rotate labels if needed
                                minRotation: 30 // Minimum rotation angle for readability
                            },
                            grid: {
                                drawBorder: false,
                                drawOnChartArea: true,
                                drawTicks: false
                            },
                            reverse: true // Invert the X-axis
                        },
                        y: {
                            ticks: {
                                display: false // Hide Y-axis labels
                            }
                        }
                    }
                }
            });

            // Update humidity chart
            const humidityCtx = document.getElementById('humidityChart').getContext('2d');
            new Chart(humidityCtx, {
                type: 'line',
                data: {
                    labels: adjustedLabels,
                    datasets: [{
                        label: 'Humidity (%)',
                        data: data.humidity.chartData,
                        borderColor: 'rgba(153, 102, 255, 1)',
                        backgroundColor: 'rgba(153, 102, 255, 0.2)',
                        fill: true,
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        tooltip: {
                            callbacks: {
                                label: function(tooltipItem) {
                                    return `Humidity: ${tooltipItem.raw}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Date and Time'
                            },
                            ticks: {
                                autoSkip: false, // Ensure all labels are shown
                                maxRotation: 45, // Rotate labels if needed
                                minRotation: 30 // Minimum rotation angle for readability
                            },
                            grid: {
                                drawBorder: false,
                                drawOnChartArea: true,
                                drawTicks: false
                            },
                            reverse: true // Invert the X-axis
                        },
                        y: {
                            ticks: {
                                display: false // Hide Y-axis labels
                            }
                        }
                    }
                }
            });
        }

        // Call the updateUI function when the page loads
        window.onload = updateUI;
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Temperature Chart</title>
    <!-- Include Chart.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin-top: 20px;
            font-size: 24px;
            color: #333;
            text-align: center;
        }

        .container {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            max-width: 90%;
            width: 800px;
            margin: 20px;
        }

        .controls {
            margin-bottom: 20px;
            text-align: center;
        }

        .chart-card {
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 400px;
        }

        @media (max-width: 768px) {
            .container {
                width: 100%;
                padding: 15px;
            }

            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <h1>Daily Temperature Chart</h1>
    <div class="container">
        <div class="controls">
            <label for="monthSelector">Select Month Number:</label>
            <select id="monthSelector">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
            </select>
        </div>
        
        <div class="chart-card">
            <div class="chart-container">
                <!-- Container for the daily temperature chart -->
                <canvas id="dailyTemperatureChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let dailyTemperatureChart = null;

        async function fetchDailyTemperatureData(month) {
            try {
                const response = await fetch(`/api/daily_temperature/${month}`);
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json();
            } catch (error) {
                console.error('Error fetching daily temperature data:', error);
                return {};
            }
        }

        function clearChart() {
            if (dailyTemperatureChart) {
                dailyTemperatureChart.destroy();
                dailyTemperatureChart = null;
            }
        }

        async function renderDailyTemperatureChart(month) {
            try {
                const data = await fetchDailyTemperatureData(month);
                console.log('Fetched data for daily chart:', data); // Debugging line

                const days = Array.from({ length: 31 }, (_, i) => i + 1); // Days from 1 to 31
                const temperatures = days.map(day => data[day] || null); // Use null for missing data

                const ctx = document.getElementById('dailyTemperatureChart').getContext('2d');

                // Clear the previous chart if it exists
                clearChart();

                dailyTemperatureChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: days.map(day => `${day}`),
                        datasets: [{
                            label: `Daily Temperature for Month ${month}`,
                            data: temperatures,
                            backgroundColor: 'rgba(255, 99, 132, 0.2)',
                            borderColor: 'rgba(255, 99, 132, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: {
                                title: {
                                    display: true,
                                    text: 'Day of the Month'
                                },
                                ticks: {
                                    autoSkip: false,
                                    maxRotation: 45,
                                    minRotation: 30
                                }
                            },
                            y: {
                                title: {
                                    display: true,
                                    text: 'Temperature (°C)'
                                },
                                ticks: {
                                    beginAtZero: true
                                }
                            }
                        },
                        plugins: {
                            legend: {
                                position: 'top'
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(tooltipItem) {
                                        return `Temperature: ${tooltipItem.raw !== null ? tooltipItem.raw + '°C' : 'No data'}`;
                                    }
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error('Error rendering daily temperature chart:', error);
            }
        }

        // Initial chart render
        async function initializeCharts() {
            const initialMonth = document.getElementById('monthSelector').value;
            await renderDailyTemperatureChart(initialMonth);
        }

        initializeCharts();

        // Add event listener for month selection
        document.getElementById('monthSelector').addEventListener('change', async (event) => {
            const selectedMonth = event.target.value;
            await renderDailyTemperatureChart(selectedMonth);
        });
    </script>
</body>
</html>
